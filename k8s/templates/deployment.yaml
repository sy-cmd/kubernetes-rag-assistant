apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-app
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-app
  template:
    metadata:
      labels:
        app: rag-app
    spec:
      serviceAccountName: rag-app
      containers:
      - name: rag-app
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: rag-app-config
        env:
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: rag-app-secret
              key: GROQ_API_KEY
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: docs
          mountPath: /docs
          readOnly: true
      volumes:
      - name: docs
        hostPath:
          path: {{ .Values.docsHostPath }}
          type: Directory
