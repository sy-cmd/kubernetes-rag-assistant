apiVersion: v1
kind: ServiceAccount
metadata:
  name: rag-app
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rag-app-cluster-reader
rules:
- apiGroups: [""]
  resources: ["pods", "events"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rag-app-cluster-reader-binding
subjects:
- kind: ServiceAccount
  name: rag-app
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: rag-app-cluster-reader
  apiGroup: rbac.authorization.k8s.io
