version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DOCS_PATH=/docs
    volumes:
      - ${DOCS_PATH}:/docs:ro
    depends_on:
      - qdrant

volumes:
  qdrant_data:
